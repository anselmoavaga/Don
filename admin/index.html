<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Debug</title>
</head>
<body>
  <div id="log" style="font-family:monospace;padding:16px;background:#111;color:#0f0;min-height:100vh;white-space:pre-wrap;font-size:13px;"></div>

  <script>
    const log = document.getElementById('log');
    function print(msg, color) {
      const line = document.createElement('div');
      line.style.color = color || '#0f0';
      line.textContent = '[' + new Date().toLocaleTimeString() + '] ' + msg;
      log.appendChild(line);
    }

    print('Page chargée ✓');
    print('Chargement du script Decap CMS...');

    window.onerror = function(msg, src, line, col, err) {
      print('ERREUR JS: ' + msg, '#f55');
      print('Fichier: ' + src + ' ligne ' + line, '#f55');
      return false;
    };

    const script = document.createElement('script');
    script.src = 'https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js';
    script.onload = function() {
      print('Script Decap chargé ✓', '#0ff');
      print('Vérification CMS object: ' + (typeof CMS), '#0ff');
    };
    script.onerror = function(e) {
      print('ECHEC chargement script Decap !', '#f55');
      print('Vérifie ta connexion internet', '#f55');
    };
    document.head.appendChild(script);
  </script>
</body>
</html>
